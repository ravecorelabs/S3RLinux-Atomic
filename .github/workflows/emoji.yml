name: 'Emoji reactions bot'

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  emoji:
    runs-on: ubuntu-latest
    steps:
      - name: React to new issues/PRs 😎
        uses: actions/github-script@v7
        with:
          script: |
            const reaction = context.eventName === 'issues' ? '🎉' : '🚀';
            github.rest.reactions.createForReaction(context.repo.owner, context.repo.repo, context.payload[context.eventName].id, reaction);
      
      - name: Add fun labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['welcome', 'ready-for-review'];
            const number = context.eventName === 'issues' ? context.payload.issue.number : context.payload.pull_request.number;
            for (const label of labels) {
              try {
                github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: number,
                  labels: [label]
                });
              } catch (e) {
                // Label might already exist, that's ok
              }
            }