name: 'Release Drafter'

on:
  push:
    branches:
      - main

jobs:
  draft_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config: release-drafter-config.yml
        env:
          GITHUB_TOKEN: ${{ github.token }}